<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<description>Append Nerd Font Symbols as fallback for icon glyphs</description>

	<!-- Append Symbols Nerd Font Mono as fallback for monospace fonts -->
	<match target="pattern">
		<test name="family"><string>monospace</string></test>
		<edit name="family" mode="append"><string>Symbols Nerd Font Mono</string></edit>
	</match>

	<!-- Append Symbols Nerd Font as fallback for sans-serif fonts -->
	<match target="pattern">
		<test name="family"><string>sans-serif</string></test>
		<edit name="family" mode="append"><string>Symbols Nerd Font</string></edit>
	</match>

	<!-- Append Symbols Nerd Font as fallback for serif fonts -->
	<match target="pattern">
		<test name="family"><string>serif</string></test>
		<edit name="family" mode="append"><string>Symbols Nerd Font</string></edit>
	</match>
</fontconfig>
